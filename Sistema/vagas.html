<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de aviso!</title>
    <link rel="icon" href="img/IVR.png" type="image/x-icon">
    <link rel="stylesheet" href="css/vagas.css">
</head>

<div id="app-view">
        <main class="container">
            
            <div class="header-banner-wrapper">
                <header class="header-layout">
                    <div class="header-left">
                        <img src="img/IVR.png" alt="Logo IVR" class="header-logo">
                        <div class="subtitle">Agendamento de serviços</div>
                        <h1>Painel de vagas</h1>
                    </div>
                    
                    <div class="header-right">
                        <div class="clock-container">
                            <div id="live-time" class="clock-time">00:00:00</div>
                            <div id="live-date" class="clock-date">Carregando data...</div>
                        </div>
                        <div class="header-desc-text">
                            Janela de atendimento vigente em cada praça,<br>atualizada pelo time de operações.
                        </div>
                    </div>
                </header>

                <section class="top-bar">
                    <div class="action-buttons">
                        <button id="btn-logout" class="btn btn-danger-outline">🚪 Sair</button>                
                    </div>
                </section>
            </div>
